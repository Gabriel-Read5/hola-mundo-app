name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm ci

      - run: npx jest

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hola-mundo-app .

      - name: Push Docker
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hola-mundo-app

      - name: Deploy Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"